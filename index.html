<div id="birthday-banner">Happy Birthday! 🎂</div>

<script>
(function() {
    var quotes = [
        'In the land of the blind, the one eyed man is king.',
        'Everything around you that you call life was made up by people that were no smarter than you and you can change it, you can influence it, you can build your own things that other people can use.',
        "There are two kinds of people: Those who think they can, and those who think they can't, and they're both right.",
        'One who makes no mistakes makes nothing at all.',
        'When small men begin to cast big shadows, it means that the sun is about to set.'
    ];
    var quoteEl = document.getElementById('home-quote');
    if (quoteEl) {
        var randomIndex = Math.floor(Math.random() * quotes.length);
        quoteEl.textContent = quotes[randomIndex];
    }

    var today = new Date();
    var birthYear = 2004, birthMonth = 1, birthDay = 26;
    var age = today.getFullYear() - birthYear;
    if (today.getMonth() < birthMonth ||
        (today.getMonth() === birthMonth && today.getDate() < birthDay)) {
        age--;
    }

    var ageEl = document.getElementById('age');
    if (ageEl) {
        ageEl.textContent = age;
    }

    if (today.getMonth() === birthMonth && today.getDate() === birthDay && ageEl) {
        ageEl.textContent = '🎉 ' + age + ' 🎉';
        ageEl.classList.add('birthday-age');
        document.getElementById('birthday-banner').classList.add('visible');

        var colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b', '#cc5de8'];
        for (var i = 0; i < 60; i++) {
            var c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            c.style.animationDelay = (Math.random() * 3) + 's';
            c.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(c);
        }
        setTimeout(function() {
            document.querySelectorAll('.confetti').forEach(function(el) { el.remove(); });
        }, 6000);
    }
})();
</script>
